<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEL-SAMPAH Pro v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab { display: none; }
        .active { display: block; }
        .gradient-bg { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="gradient-bg text-white shadow-2xl p-6 mb-8 rounded-b-[2rem]">
        <div class="flex items-center gap-4 mb-4">
            <img src="https://images.glints.com/unsafe/glints-dashboard.oss-ap-southeast-1.aliyuncs.com/company-logo/f7d8bea51e2a3837a0a8ec8fe10c4b41.png" alt="Logo Sekolah" class="w-12 h-12 rounded-full bg-white p-1 object-contain">
            <div>
                <h1 class="text-3xl font-black tracking-tight">APEL-SAMPAH</h1>
                <p class="opacity-90 font-medium">Sistem Pengelolaan Sampah Sekolah</p>
            </div>
        </div>
        <div class="flex gap-2 mt-6 overflow-x-auto pb-2 scrollbar-hide">
            <button onclick="showTab('dashboard')" class="bg-white/20 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Dashboard</button>
            <button onclick="showTab('siswa')" class="bg-white/20 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Data Siswa</button>
            <button onclick="showTab('setoran')" class="bg-white/20 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Input Setoran</button>
            <button onclick="showTab('riwayat')" class="bg-white/20 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Riwayat</button>
            <button onclick="showTab('ranking')" class="bg-white/20 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Ranking</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <div id="dashboard" class="tab active">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                    <p class="text-slate-400 text-xs uppercase font-bold">Total Siswa</p>
                    <h3 id="stat-siswa" class="text-3xl font-black text-emerald-600">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                    <p class="text-slate-400 text-xs uppercase font-bold">Total Setoran</p>
                    <h3 id="stat-setoran" class="text-3xl font-black text-emerald-600">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 col-span-2 md:col-span-1">
                    <p class="text-slate-400 text-xs uppercase font-bold">Total Poin Terkumpul</p>
                    <h3 id="stat-poin" class="text-3xl font-black text-emerald-600">0</h3>
                </div>
            </div>
        </div>

        <div id="siswa" class="tab">
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                <h2 class="text-lg font-bold mb-4">Registrasi Siswa Baru</h2>
                <div class="flex gap-2 flex-wrap">
                    <input type="text" id="nama-siswa" placeholder="Nama Lengkap" class="flex-1 min-w-[200px] p-3 bg-slate-50 border rounded-xl">
                    <select id="kelas-siswa" class="p-3 bg-slate-50 border rounded-xl">
                        <option value="VII">Kelas VII</option>
                        <option value="VIII">Kelas VIII</option>
                        <option value="IX">Kelas IX</option>
                        <option value="X">Kelas X</option>
                    </select>
                    <button onclick="addSiswa()" class="bg-emerald-600 text-white px-6 rounded-xl font-bold">Tambah</button>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <tbody id="list-siswa" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="setoran" class="tab">
            <div class="bg-white p-8 rounded-3xl shadow-sm border">
                <h2 class="text-xl font-bold mb-6">Input Setoran Sampah</h2>
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-400">Pilih Siswa</label>
                    <select id="select-siswa" class="w-full p-4 bg-slate-50 border rounded-2xl"></select>
                    <label class="block text-sm font-bold text-slate-400">Jenis Sampah</label>
                    <select id="select-jenis" class="w-full p-4 bg-slate-50 border rounded-2xl"></select>
                    <label class="block text-sm font-bold text-slate-400">Berat (Kg)</label>
                    <input type="number" id="berat" placeholder="Contoh: 2.5" class="w-full p-4 bg-slate-50 border rounded-2xl">
                    <button onclick="addSetoran()" class="w-full gradient-bg text-white p-4 rounded-2xl font-black text-lg mt-4">Simpan Setoran</button>
                </div>
            </div>
        </div>

        <div id="riwayat" class="tab">
            <h2 class="text-xl font-bold mb-4">Riwayat Setoran</h2>
            <div id="list-riwayat" class="space-y-3"></div>
        </div>

        <div id="ranking" class="tab">
            <h2 class="text-xl font-bold mb-4">Papan Peringkat</h2>
            <div id="list-ranking" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const dataAwal = [
            {nama: "Elizabeth Petronella Arwakon", kelas: "VII"}, {nama: "Delyla Danarty Wulandari Awom", kelas: "VII"}, {nama: "Mutiara Ayorbaba", kelas: "VII"}, {nama: "Rode Adelfia Ayello", kelas: "VII"}, {nama: "Yuyun Masita Rudisman", kelas: "VII"}, {nama: "Louis Candra Amunauw", kelas: "VII"}, {nama: "Cristo Antoni Nataniel Burdam", kelas: "VII"}, {nama: "Mariyane Mambraku", kelas: "VII"}, {nama: "David Rezakia Mambrasar", kelas: "VII"}, {nama: "Febrian Alpius Manuk", kelas: "VII"}, {nama: "Hugo Israel Sanadi", kelas: "VII"}, {nama: "Audea Tauye Arwakon", kelas: "VII"}, {nama: "Naindes Alberto Sauyai", kelas: "VII"}, {nama: "Kondrat Marfel Mambrasar", kelas: "VII"}, {nama: "Uziel Eddom Mambraku", kelas: "VII"},
            {nama: "Aris Darmawan Dimara", kelas: "VIII"}, {nama: "Carles Kabes", kelas: "VIII"}, {nama: "Markus Fan Dyke Hara", kelas: "VIII"}, {nama: "Febi Katrince Sauyai", kelas: "VIII"}, {nama: "Hengky Mayor", kelas: "VIII"}, {nama: "Lohini Arwakon", kelas: "VIII"}, {nama: "Diktri Florensya Koernelia Umpain", kelas: "VIII"}, {nama: "Mahli Mira Sauyai", kelas: "VIII"}, {nama: "Mariantina Papuani Waropen", kelas: "VIII"}, {nama: "Yucha Fenechya Burdam", kelas: "VIII"}, {nama: "Vibrio Dimara", kelas: "VIII"}, {nama: "Donal Penyel Gaman", kelas: "VIII"},
            {nama: "Elkanus Ambafen", kelas: "IX"}, {nama: "Bram Hendrik Sauyai", kelas: "IX"}, {nama: "Neta Dlofia Mambrasar", kelas: "IX"}, {nama: "Marsya Melinda Werinussa", kelas: "IX"}, {nama: "Atin Cornelia Bonsapia", kelas: "IX"}, {nama: "Sarinande Amelia Abaire", kelas: "IX"}, {nama: "Markus Yowel Dimara", kelas: "IX"}, {nama: "Frans Alexs Werinussa", kelas: "IX"}, {nama: "Fanita Mince Burdam", kelas: "IX"},
            {nama: "Alvaro Felix Esau Dimara", kelas: "X"}, {nama: "Ledrik Mamarodi", kelas: "X"}, {nama: "Aksamina Mery Mambrasar", kelas: "X"}, {nama: "Gelson Wawiyai", kelas: "X"}, {nama: "Niko Mambrasar", kelas: "X"}, {nama: "Sonia Dimara", kelas: "X"}, {nama: "Mesly Mambrasar", kelas: "X"}, {nama: "Marco Geboy Mayor", kelas: "X"}, {nama: "Paskalita Kambu", kelas: "X"}, {nama: "Jeni Mamarodi", kelas: "X"}
        ];

        let siswa = JSON.parse(localStorage.getItem('siswa'));
        if (!siswa) {
            siswa = dataAwal.map((s, index) => ({id: Date.now() + index, nama: s.nama, kelas: s.kelas, poin: 0}));
            localStorage.setItem('siswa', JSON.stringify(siswa));
        }
        
        let setoran = JSON.parse(localStorage.getItem('setoran')) || [];
        const jenis = [{nama:'Plastik', poin:10}, {nama:'Kertas', poin:5}, {nama:'Kardus', poin:7}, {nama:'Kaleng', poin:15}, {nama:'Kaca', poin:12}, {nama:'Organik', poin:3}];

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateUI();
        }

        function addSiswa() {
            let nama = document.getElementById('nama-siswa').value;
            let kelas = document.getElementById('kelas-siswa').value;
            if(!nama) return alert("Isi Nama!");
            siswa.push({id: Date.now(), nama, kelas, poin: 0});
            localStorage.setItem('siswa', JSON.stringify(siswa));
            document.getElementById('nama-siswa').value = "";
            updateUI();
        }

        function deleteSiswa(id) {
            siswa = siswa.filter(s => s.id != id);
            localStorage.setItem('siswa', JSON.stringify(siswa));
            updateUI();
        }

        function addSetoran() {
            let sId = document.getElementById('select-siswa').value;
            let jNama = document.getElementById('select-jenis').value;
            let berat = parseFloat(document.getElementById('berat').value);
            if(!berat || !sId) return alert("Lengkapi data setoran!");
            let jObj = jenis.find(j => j.nama === jNama);
            let totalPoin = berat * jObj.poin;
            siswa.find(s => s.id == sId).poin += totalPoin;
            setoran.push({sId, jNama, berat, totalPoin, tgl: new Date().toLocaleDateString()});
            localStorage.setItem('siswa', JSON.stringify(siswa));
            localStorage.setItem('setoran', JSON.stringify(setoran));
            showTab('ranking');
        }

        function updateUI() {
            document.getElementById('stat-siswa').innerText = siswa.length;
            document.getElementById('stat-setoran').innerText = setoran.length;
            document.getElementById('stat-poin').innerText = siswa.reduce((a, b) => a + b.poin, 0);
            
            document.getElementById('list-siswa').innerHTML = siswa.length > 0 ? 
                siswa.map(s => `<tr><td class="p-4 font-bold">${s.nama}</td><td class="p-4">${s.kelas}</td><td class="p-4"><button onclick="deleteSiswa(${s.id})" class="text-red-500 font-bold">Hapus</button></td></tr>`).join('') :
                `<tr><td class="p-6 text-center text-slate-400">Belum ada siswa terdaftar.</td></tr>`;
            
            document.getElementById('select-siswa').innerHTML = siswa.map(s => `<option value="${s.id}">${s.nama} (${s.kelas})</option>`).join('');
            document.getElementById('select-jenis').innerHTML = jenis.map(j => `<option value="${j.nama}">${j.nama}</option>`).join('');
            
            document.getElementById('list-riwayat').innerHTML = setoran.map((s) => {
                let namaS = siswa.find(si => si.id == s.sId)?.nama || "Unknown";
                return `<div class="flex justify-between bg-white p-4 rounded-2xl shadow-sm"><div><p class="font-bold">${namaS}</p><p class="text-xs text-slate-400">${s.jNama} - ${s.berat}kg</p></div><div class="text-right"><p class="font-black text-emerald-600">+${s.totalPoin} Poin</p></div></div>`
            }).join('');
            
            let sorted = [...siswa].sort((a,b) => b.poin - a.poin);
            document.getElementById('list-ranking').innerHTML = sorted.map((s, i) => `<div class="flex justify-between items-center p-5 bg-white rounded-2xl shadow-sm ${i===0?'border-2 border-emerald-500':''}"><div><span class="font-bold text-slate-400 mr-4">#${i+1}</span><span class="font-bold">${s.nama}</span><span class="ml-2 text-[10px] bg-slate-100 px-2 py-1 rounded-full text-slate-500">${s.kelas}</span></div><span class="font-black text-emerald-600 text-lg">${s.poin} Poin</span></div>`).join('');
        }
        updateUI();
    </script>
</body>
</html>
